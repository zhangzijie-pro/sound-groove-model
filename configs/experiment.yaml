run:
  mode: "train"   # train | finetune

model:
  in_channels: 80
  channels: 512
  embedding_dim: 256
  max_mix_speakers: 4

loss:
  lambda_pit: 1.0
  lambda_act: 1.0
  lambda_cnt: 0.2
  lambda_frm: 0.15
  pos_weight: 2.0
  pit_pos_weight: 1.5
  proto_eps: 1.0e-8
  proto_temperature: 0.07

data:
  out_dir: "processed/static_mix_cnceleb2"
  train_manifest: "train_manifest.jsonl"
  val_manifest: "val_manifest.jsonl"
  crop_sec: 4.0

train:
  seed: 42
  device: "cuda"
  epochs: 100
  batch_size: 16
  num_workers: 2
  lr: 3.0e-4
  min_lr: 1.0e-6
  weight_decay: 1.0e-4
  grad_clip: 5.0
  use_scheduler: true

validate:
  batch_size: 64
  max_batches: -1
  activity_threshold: 0.5

output:
  save_dir: "outputs/default"
  monitor: "val_loss"      # choice: val_loss / der / act_f1
  monitor_mode: "min"      # min | max
  plot_history: true

finetune:
  checkpoint_path: ""
  load_mode: "full"        # full | backbone_only
  strict_load: true
  head_prefixes:
    - "diar_head."
  freeze_backbone: false
  lr_scale: 0.1

resume:
  enabled: false
  checkpoint_path: ""

hydra:
  run:
    dir: .
  output_subdir: null

quant:
  enable: false
  mode: "prod"          # mse | prod
  bits: 3
  clip_sigma: 3.0
  seed: 1234

  apply_frame_quant_in_validate: true

  run_tracker_in_validate: true

  apply_tracker_quant: true