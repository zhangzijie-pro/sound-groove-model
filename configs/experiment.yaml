run:
  mode: train   # train / finetune

data:
  out_dir: processed/real_diar_dataset
  train_manifest: train_manifest.jsonl
  val_manifest: val_manifest.jsonl
  crop_sec: 4.0

model:
  in_channels: 80
  channels: 512
  d_model: 256
  max_mix_speakers: 8

  # decoder type: query / eda_lstm
  decoder_type: query

  # query decoder
  decoder_layers: 4
  decoder_heads: 8
  decoder_ffn: 1024

  dropout: 0.1
  post_ffn_hidden_dim: 1024
  post_ffn_dropout: 0.1

loss:
  pit_pos_weight: 1.2
  activity_pos_weight: 1.0
  exist_pos_weight: 1.0

  lambda_activity: 0.5
  lambda_exist: 1.0
  lambda_pull: 0.2
  lambda_sep: 0.1
  lambda_smooth: 0.03

train:
  seed: 42
  device: cuda

  batch_size: 8
  num_workers: 4

  epochs: 80
  lr: 1.0e-4
  min_lr: 1.0e-6
  weight_decay: 1.0e-4
  grad_clip: 5.0

  use_scheduler: true
  warmup_epochs: 5
  warmup_start_factor: 0.1

validate:
  batch_size: 8
  max_batches: -1

  speaker_activity_threshold: 0.60
  frame_activity_threshold: 0.50
  exist_threshold: 0.5
  min_active_frames: 5

output:
  save_dir: outputs_e2e/
  plot_history: true

  # recommended: der / val_loss
  monitor: der
  monitor_mode: min

resume:
  enabled: false
  checkpoint_path: ""

finetune:
  checkpoint_path: ""
  load_mode: backbone_only   # backbone_only / full
  strict_load: false
  freeze_backbone: false
  lr_scale: 0.5

  # when freezing backbone, train only these prefixes
  head_prefixes:
    - decoder.
    - assign_head.
