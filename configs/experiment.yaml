run:
  mode: train   # train / finetune

data:
  out_dir: processed/real_diar_dataset
  train_manifest: train_manifest.jsonl
  val_manifest: val_manifest.jsonl
  crop_sec: 4.0
  same_session_train_prob: 0.5
  same_session_val_prob: 1.0

model:
  in_channels: 80
  channels: 512
  d_model: 256
  max_mix_speakers: 4
  assign_scale: 8.0

  # decoder type: query / eda_lstm
  # decoder_type: eda_lstm
  decoder_type: query


  # query decoder
  decoder_layers: 4
  decoder_heads: 8
  decoder_ffn: 512

  dropout: 0.1
  post_ffn_hidden_dim: 512
  post_ffn_dropout: 0.2

loss:
  pit_pos_weight: 1.2
  activity_pos_weight: 1.2
  exist_pos_weight: 1.5
  exist_focal_gamma: 2.0
  lambda_exist: 0.1
  lambda_activity: 0.3
  lambda_diversity: 0.02
  overlap_weight_2spk: 2.0
  overlap_weight_3spk: 3.0

train:
  seed: 42
  device: cuda

  batch_size: 32
  num_workers: 0

  epochs: 150
  lr: 5.0e-5
  min_lr: 1.0e-6
  weight_decay: 1.0e-4
  grad_clip: 1.0

  use_scheduler: true
  warmup_epochs: 1
  warmup_start_factor: 0.1
  early_stop_patience: 0
  collapse_der_threshold: 0.0
  collapse_act_f1_threshold: 0.0
  collapse_pred_active_threshold: 0.0

validate:
  batch_size: 16
  max_batches: -1

  speaker_activity_threshold: 0.55
  frame_activity_threshold: 0.5
  exist_threshold: 0.5
  min_active_frames: 5

output:
  save_dir: outputs_trainali_vox_online_query/
  plot_history: true

  # recommended: der / val_loss
  monitor: der
  monitor_mode: min

resume:
  enabled: false
  checkpoint_path: ""

finetune:
  checkpoint_path: ""
  load_mode: backbone_only   # backbone_only / full
  strict_load: false
  freeze_backbone: false
  lr_scale: 0.5

  # when freezing backbone, train only these prefixes
  head_prefixes:
    - decoder.
    - assign_head.
