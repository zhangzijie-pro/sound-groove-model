seed: 1234
device: "cuda"
out_dir: "outputs"

data:
  out_dir: "processed/static_mix_cnceleb2"
  train_manifest: "train_manifest.jsonl"
  val_manifest: "val_manifest.jsonl"
  crop_sec: 4.0

model:
  feat_dim: 80
  channels: 512
  emb_dim: 192
  max_mix_speakers: 4

loss:
  lambda_ver: 0.0 # 0.1
  lambda_pit: 1.0
  lambda_act: 1.0
  lambda_cnt: 0.2
  pos_weight: 2.0
  pit_pos_weight: 1.5

train:
  epochs: 100
  batch_size: 16
  num_workers: 0
  lr: 3.0e-4
  weight_decay: 3.0e-5
  grad_clip: 5.0
  amp: true
  val_batches: 100