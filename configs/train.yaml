model:
  in_channels: 80
  channels: 512
  embd_dim: 256
  max_mix_speakers: 4

loss:
  lambda_pit: 1.0
  lambda_act: 1.0
  lambda_cnt: 0.2
  lambda_frm: 0.15
  pos_weight: 2.0
  pit_pos_weight: 1.5
  proto_eps: 1.0e-8
  proto_temperature: 0.07

data:
  out_dir: "processed/static_mix_cnceleb2"
  train_manifest: "processed/static_mix_cnceleb2/train_manifest.json"
  val_manifest: "processed/static_mix_cnceleb2/val_manifest.json"
  crop_sec: 4.0

train:
  seed: 42
  device: "cuda"
  epochs: 100
  batch_size: 16
  num_workers: 2
  lr: 3.0e-4
  min_lr: 1.0e-6
  weight_decay: 1.0e-4
  grad_clip: 5.0
  use_scheduler: true

validate:
  batch_size: 64
  max_batches: -1
  activity_threshold: 0.5

output:
  save_dir: "outputs_318"
  monitor: "val_loss"
  monitor_mode: "min"
  plot_history: true

hydra:
  run:
    dir: .
  output_subdir: null